name: Build Windows Executable

on:
  [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    if: github.event_name != 'push' || (!contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.message, '[ci skip]'))

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pygame-ce pyinstaller

      - name: Build executable with PyInstaller
        run: |
          pyinstaller --clean --noconfirm squirrel-eats-squirrel.spec

      - name: Zip executable
        run: |
          Compress-Archive -Path dist\squirrel-eats-squirrel.exe -DestinationPath dist\squirrel-eats-squirrel.zip -Force

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Squirrel Eat Squirrel v1.0.${{ github.run_number }}
          files: dist/squirrel-eats-squirrel.zip
